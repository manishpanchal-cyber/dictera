<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Illuminate — Course Details</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --grad:linear-gradient(135deg,#6c5cd4,#4a7fe0);
    --grad-bg:linear-gradient(135deg,#7367d8 0%,#3fb3a3 100%);
    --brand:#4a7fe0; --link:#2f6fe0;
    --panel:#ffffff; --surface:#f5f6fb; --surface-2:#eef0f7;
    --border:#e9eaf2; --border-strong:#d9dbe7;
    --text:#2e3344; --text-2:#6b7280; --text-3:#9aa0ab;
    --amber-bg:#fdf4d0; --amber-text:#8a6d1a; --amber-border:#f0e2a6;
    --green-bg:#e8f8ef; --green-text:#138a5b; --green-border:#a6e3c6;
    --info-bg:#eaf1fd; --info-text:#2f6fe0; --info-border:#cfe0fb;
    --gray-bg:#eef0f4; --gray-text:#6b7280;
    --teal:#1d9e85;
    --radius:12px; --radius-lg:16px;
    --rail:#14141f;
  }
  body.dark{
    --panel:#1b1c28; --surface:#23242f; --surface-2:#2b2c39;
    --border:#2d2f3d; --border-strong:#3b3d4e;
    --text:#e9eaf2; --text-2:#a9adba; --text-3:#787c87;
    --amber-bg:#3a3414; --amber-text:#f1cb5d; --amber-border:#5a5020;
    --green-bg:#0f3329; --green-text:#5dcaa5; --green-border:#1d5946;
    --info-bg:#1b2740; --info-text:#7aa6ee; --info-border:#2c3f63;
    --gray-bg:#2a2b37; --gray-text:#9aa0ab;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--grad-bg);display:flex;font-family:'Inter',system-ui,sans-serif;color:var(--text);}
  h1,h2,h3,.font-display{font-family:'Poppins','Inter',sans-serif;}
  .icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  /* RAIL */
  .rail{width:80px;flex:0 0 80px;background:var(--rail);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:18px;position:sticky;top:0;height:100vh;}
  .logo{width:42px;height:42px;border-radius:12px;background:conic-gradient(from 200deg,#6c5cd4,#4a7fe0,#1d9e85,#7dd36f,#6c5cd4);display:flex;align-items:center;justify-content:center;}
  .logo::after{content:"";width:16px;height:16px;border-radius:4px 12px 4px 12px;background:#fff;opacity:.92;}
  .rail-btn{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;color:#b7b9c8;background:transparent;border:1px solid #2b2c3a;cursor:pointer;transition:.15s;}
  .rail-btn:hover{color:#fff;border-color:#3a3b4d;}
  .rail-btn.active{background:var(--grad);color:#fff;border:none;}
  .rail-btn.plain{border:none;}
  .rail-spacer{flex:1;}

  /* STAGE / PANEL */
  .stage{flex:1;min-width:0;padding:16px 16px 16px 14px;}
  .panel{background:var(--panel);border-radius:20px;min-height:calc(100vh - 32px);padding:30px 34px;}

  .pagehead{display:flex;align-items:center;gap:12px;}
  .back{width:34px;height:34px;border-radius:50%;background:var(--grad);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 34px;}
  .back .icon{width:18px;height:18px;}
  h1{font-size:26px;font-weight:600;margin:0;letter-spacing:-.01em;}
  .crumbs{margin:6px 0 0 46px;font-size:13.5px;color:var(--text-2);}
  .crumbs a{color:var(--text-2);text-decoration:none;}
  .crumbs .cur{color:var(--link);}

  .coursebar{margin-top:22px;border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:26px;flex-wrap:wrap;}
  .coursebar .cname{font-size:15px;}
  .coursebar .cname b{font-family:'Poppins';font-weight:600;}
  .coursebar .meta{display:flex;align-items:center;gap:8px;color:var(--text-2);font-size:14px;}
  .coursebar .sep{width:1px;height:18px;background:var(--border-strong);}
  .coursebar .icon{width:18px;height:18px;color:var(--brand);}

  .sectionhead{margin:30px 0 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .sectionhead h2{font-size:20px;font-weight:600;margin:0;margin-right:auto;}

  .search{position:relative;}
  .search .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-3);}
  .search input{height:42px;padding:0 14px 0 38px;border:1px solid var(--border-strong);border-radius:12px;background:var(--panel);color:var(--text);font:inherit;font-size:14px;width:240px;outline:none;}
  .search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--info-bg);}

  .selwrap{position:relative;display:flex;align-items:center;height:42px;padding:0 36px 0 14px;border:1px solid var(--border-strong);border-radius:12px;background:var(--panel);font-size:14px;color:var(--text);}
  .selwrap label{color:var(--text-2);margin-right:5px;}
  .selwrap select{border:none;background:transparent;font:inherit;color:var(--link);font-weight:500;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;padding-right:2px;}
  .selwrap .chev{position:absolute;right:12px;width:16px;height:16px;color:var(--text-3);pointer-events:none;}

  .toggle{display:flex;border:1px solid var(--border-strong);border-radius:12px;overflow:hidden;}
  .toggle button{width:42px;height:42px;border:none;background:var(--panel);color:var(--text-3);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .toggle button.active{background:var(--info-bg);color:var(--info-text);}
  .toggle button+button{border-left:1px solid var(--border-strong);}

  .btn-primary{height:42px;padding:0 18px;border:none;border-radius:12px;background:var(--grad);color:#fff;font:inherit;font-weight:500;font-size:14px;display:flex;align-items:center;gap:8px;cursor:pointer;}
  .btn-primary .icon{width:18px;height:18px;}

  /* CARD GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px;}
  .card{border:1px solid var(--border);border-radius:16px;padding:18px 18px 16px;background:var(--panel);display:flex;flex-direction:column;transition:.15s;}
  .card:hover{border-color:var(--border-strong);box-shadow:0 6px 22px rgba(40,45,90,.07);}
  .card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .card-title{font-family:'Poppins';font-weight:500;font-size:15.5px;line-height:1.4;margin:0;}
  .kebab{border:none;background:transparent;color:var(--text-3);cursor:pointer;padding:2px;border-radius:6px;}
  .kebab:hover{background:var(--surface);}
  .badges{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0 14px;}
  .badge{font-size:12px;padding:4px 11px;border-radius:9px;display:inline-flex;align-items:center;gap:5px;}
  .badge .icon{width:14px;height:14px;}
  .b-roleplay{background:var(--info-bg);color:var(--info-text);}
  .b-quiz{background:#efeafe;color:#5a4bc4;}
  body.dark .b-quiz{background:#2a2548;color:#b3a7f0;}
  .b-gray{background:var(--gray-bg);color:var(--gray-text);}
  .meta2{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;font-size:13px;margin-bottom:14px;}
  .meta2 .k{color:var(--text-3);display:block;margin-bottom:2px;font-size:12px;}
  .progwrap{border-top:1px solid var(--border);padding-top:13px;}
  .prow{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:8px;}
  .prow .lab{color:var(--text-2);}
  .prow .cnt b{font-weight:600;}
  .prow .cnt .muted{color:var(--text-3);}
  .pbar{display:flex;height:8px;border-radius:99px;overflow:hidden;gap:2px;margin-bottom:11px;background:var(--surface-2);}
  .pbar i{display:block;}
  .seg-done{background:#1d9e85;}
  .seg-pend{background:#ef9f27;}
  .seg-ns{background:#c7cad6;}
  body.dark .seg-ns{background:#3b3d4e;}
  .legend{display:flex;align-items:center;gap:14px;font-size:12.5px;flex-wrap:wrap;color:var(--text-2);}
  .legend .dot{width:8px;height:8px;border-radius:99px;display:inline-block;margin-right:6px;}
  .legend .avg{margin-left:auto;display:inline-flex;align-items:center;gap:5px;}
  .legend .avg .icon{width:14px;height:14px;color:#ba7517;}
  .legend .avg b{color:var(--text);font-weight:600;}
  .card-actions{display:flex;gap:8px;margin-top:15px;}
  .btn-soft{flex:1;height:38px;border:1px solid var(--border-strong);background:transparent;color:var(--text);border-radius:11px;font:inherit;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;}
  .btn-soft:hover{background:var(--surface);}
  .btn-soft .icon{width:16px;height:16px;}
  .btn-view{flex:1;height:38px;border:1px solid var(--info-border);background:var(--info-bg);color:var(--info-text);border-radius:11px;font:inherit;font-weight:500;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;text-decoration:none;}
  .btn-view .icon{width:16px;height:16px;}

  /* LIST VIEW */
  .listview{display:none;}
  table.list{width:100%;border-collapse:collapse;font-size:13.5px;}
  table.list thead th{text-align:left;font-weight:500;color:var(--text-2);background:var(--surface);padding:12px 14px;font-size:13px;}
  table.list thead th:first-child{border-radius:10px 0 0 10px;}
  table.list thead th:last-child{border-radius:0 10px 10px 0;}
  table.list tbody td{padding:14px;border-bottom:1px solid var(--border);}
  table.list tbody tr:hover{background:var(--surface);}
  .ltitle{font-family:'Poppins';font-weight:500;}
  .miniprog{display:flex;align-items:center;gap:8px;}
  .miniprog .bar{width:90px;height:7px;border-radius:99px;background:var(--surface-2);overflow:hidden;display:flex;gap:1px;}
  .link{color:var(--link);text-decoration:none;display:inline-flex;align-items:center;gap:4px;font-weight:500;}
  .link .icon{width:14px;height:14px;}

  /* DRAWER */
  .overlay{position:fixed;inset:0;background:rgba(20,20,35,.42);opacity:0;visibility:hidden;transition:.2s;z-index:40;}
  .overlay.open{opacity:1;visibility:visible;}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:420px;max-width:92vw;background:var(--panel);z-index:50;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(20,20,40,.18);}
  .drawer.open{transform:translateX(0);}
  .dr-head{padding:20px 22px 14px;border-bottom:1px solid var(--border);}
  .dr-head .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .dr-head h3{font-family:'Poppins';font-weight:500;font-size:16px;margin:0 0 9px;line-height:1.4;}
  .dr-close{border:none;background:var(--surface);color:var(--text-2);width:30px;height:30px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 30px;}
  .dr-body{flex:1;overflow-y:auto;padding:18px 22px 24px;}
  .stat2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .stat-tile{background:var(--surface);border-radius:11px;padding:11px 13px;}
  .stat-tile .k{font-size:12px;color:var(--text-2);display:block;}
  .stat-tile .v{font-size:22px;font-weight:600;font-family:'Poppins';}
  .stat-tile.warn{background:var(--amber-bg);}
  .stat-tile.warn .k,.stat-tile.warn .v{color:var(--amber-text);}
  .alert{background:var(--amber-bg);border:1px solid var(--amber-border);color:var(--amber-text);border-radius:11px;padding:10px 13px;display:flex;align-items:center;gap:9px;font-size:13.5px;margin-bottom:18px;}
  .alert .icon{width:17px;height:17px;}
  .dr-label{font-size:11.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin:0 0 9px;}
  .setup{width:100%;font-size:13.5px;margin-bottom:20px;}
  .setup td{padding:5px 0;vertical-align:top;}
  .setup td.k{color:var(--text-2);width:38%;}
  .lrow{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--border);}
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex:0 0 32px;}
  .av-info{background:var(--info-bg);color:var(--info-text);}
  .av-gray{background:var(--surface-2);color:var(--text-2);}
  .lrow .nm{flex:1;min-width:0;}
  .lrow .nm span{display:block;font-size:13.5px;}
  .lrow .nm small{color:var(--text-3);font-size:11.5px;}
  .pill{font-size:11.5px;padding:3px 9px;border-radius:8px;white-space:nowrap;}
  .pill-done{background:var(--green-bg);color:var(--green-text);}
  .pill-pend{background:var(--amber-bg);color:var(--amber-text);}
  .pill-ns{background:var(--gray-bg);color:var(--gray-text);}
  .scoreb{font-weight:600;font-size:13.5px;}
  .dr-foot{padding:14px 22px;border-top:1px solid var(--border);}
  .dr-foot a{width:100%;height:40px;border:1px solid var(--border-strong);border-radius:11px;display:flex;align-items:center;justify-content:center;gap:7px;color:var(--text);text-decoration:none;font-size:13.5px;}
  .dr-foot a:hover{background:var(--surface);}
  .dr-foot .icon{width:15px;height:15px;}

  .empty{padding:50px;text-align:center;color:var(--text-3);}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#2e3344;color:#fff;padding:11px 18px;border-radius:11px;font-size:14px;opacity:0;transition:.25s;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:720px){.panel{padding:22px 16px;} .search input{width:100%;} .rail{display:none;} .stage{padding:10px;}}
</style>
</head>
<body>

<svg style="display:none">
  <symbol id="i-chev-left" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></symbol>
  <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
  <symbol id="i-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></symbol>
  <symbol id="i-list" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></symbol>
  <symbol id="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></symbol>
  <symbol id="i-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></symbol>
  <symbol id="i-logout" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></symbol>
  <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></symbol>
  <symbol id="i-chev-down" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></symbol>
  <symbol id="i-chev-right" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></symbol>
  <symbol id="i-msg" viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 01-9 8.4 8.4 8.4 0 01-3.8-.9L3 21l1.9-5.2A8.4 8.4 0 1121 11.5z"/></symbol>
  <symbol id="i-clipboard" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="8" y="3" width="8" height="4" rx="1.5"/></symbol>
  <symbol id="i-arrow-right" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></symbol>
  <symbol id="i-star" viewBox="0 0 24 24"><path d="M12 2l3 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.9 21l1.2-6.8-5-4.9 6.9-1z"/></symbol>
  <symbol id="i-clock-ex" viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4M12 17h.01"/></symbol>
  <symbol id="i-x" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></symbol>
  <symbol id="i-ext" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></symbol>
  <symbol id="i-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></symbol>
  <symbol id="i-users" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.9M16 3.1a4 4 0 010 7.7"/></symbol>
  <symbol id="i-panel" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M15 3v18"/></symbol>
  <symbol id="i-kebab" viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></symbol>
</svg>

<nav class="rail">
  <div class="logo"></div>
  <button class="rail-btn" title="Create" onclick="toast('New item — demo only')"><svg class="icon"><use href="#i-plus"/></svg></button>
  <button class="rail-btn active" title="Dashboard"><svg class="icon"><use href="#i-grid"/></svg></button>
  <div class="rail-spacer"></div>
  <button class="rail-btn plain" title="Toggle theme" onclick="toggleTheme()"><svg class="icon" id="theme-ic"><use href="#i-sun"/></svg></button>
  <button class="rail-btn plain" title="Log out" onclick="toast('Logged out — demo only')"><svg class="icon"><use href="#i-logout"/></svg></button>
</nav>

<main class="stage">
  <section class="panel">
    <div class="pagehead">
      <button class="back" onclick="history.length>1?history.back():toast('Back to dashboard')"><svg class="icon"><use href="#i-chev-left"/></svg></button>
      <h1>Course details</h1>
    </div>
    <div class="crumbs"><a href="#" onclick="return false">Dashboard</a> &rsaquo; <span class="cur">Course details</span></div>

    <div class="coursebar">
      <div class="cname">Course name: <b>AMLI Demo (AMLID)</b></div>
      <div class="meta"><svg class="icon"><use href="#i-grid"/></svg> Class sections: 2</div>
      <div class="sep"></div>
      <div class="meta"><svg class="icon"><use href="#i-users"/></svg> 6 students</div>
      <div class="sep"></div>
      <div class="meta"><svg class="icon"><use href="#i-clipboard"/></svg> 3 assessments</div>
    </div>

    <div class="sectionhead">
      <h2>Assessments</h2>
      <div class="search"><svg class="icon"><use href="#i-search"/></svg><input id="q" type="text" placeholder="Search assessments" oninput="render()"></div>
      <div class="selwrap"><label>Class section:</label><select id="fSection" onchange="render()"><option>All</option><option>Cohort A</option><option>Cohort B</option></select><svg class="icon chev"><use href="#i-chev-down"/></svg></div>
      <div class="selwrap"><label>Mode:</label><select id="fMode" onchange="render()"><option>All</option><option>Roleplay</option><option>Quiz</option></select><svg class="icon chev"><use href="#i-chev-down"/></svg></div>
      <div class="toggle">
        <button id="tCard" class="active" title="Card view" onclick="setView('card')"><svg class="icon"><use href="#i-grid"/></svg></button>
        <button id="tList" title="List view" onclick="setView('list')"><svg class="icon"><use href="#i-list"/></svg></button>
      </div>
      <button class="btn-primary" onclick="toast('New assessment — demo only')"><svg class="icon"><use href="#i-plus"/></svg> New assessment</button>
    </div>

    <div id="cardview" class="grid"></div>
    <div id="listview" class="listview">
      <table class="list">
        <thead><tr><th>Assessment</th><th>Mode</th><th>Section</th><th>Progress</th><th>Review pending</th><th>Avg score</th><th>Action</th></tr></thead>
        <tbody id="listbody"></tbody>
      </table>
    </div>
  </section>
</main>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="dr-head">
    <div class="top">
      <h3 id="dr-title"></h3>
      <button class="dr-close" onclick="closeDrawer()" aria-label="Close"><svg class="icon" style="width:17px;height:17px"><use href="#i-x"/></svg></button>
    </div>
    <div class="badges" id="dr-badges" style="margin:0"></div>
  </div>
  <div class="dr-body">
    <div class="stat2" id="dr-stats"></div>
    <div id="dr-alert"></div>
    <p class="dr-label">Setup</p>
    <table class="setup" id="dr-setup"></table>
    <p class="dr-label">Learners</p>
    <div id="dr-learners"></div>
  </div>
  <div class="dr-foot"><a id="dr-full" href="assessment-details.html">Open full page <svg class="icon"><use href="#i-ext"/></svg></a></div>
</aside>

<div class="toast" id="toast"></div>

<script>
const DATA=[
 {id:'cdrl',title:'Consultative discovery in residential leasing',mode:'Roleplay',section:'Cohort A',role:'Junior leasing agent',context:'Commercial real estate',scenario:'Qualify a prospect relocating a 12-person team into a downtown space.',rubric:'5 criteria · max 10',due:'Jun 06, 2026',link:'assessment-details.html',
  learners:[
   {name:'Ayan Learner',email:'work.ayandutta+3@gmail.com',date:'Jun 04, 2026',score:null,status:'Review pending'},
   {name:'Ayan 18',email:'ayan.dutta+18@hurix.com',date:'Jun 04, 2026',score:8.2,status:'Completed'},
   {name:'Maya Rodriguez',email:'maya.r@hurix.com',date:'Jun 03, 2026',score:9.1,status:'Completed'},
   {name:'Leo Park',email:'leo.park@hurix.com',date:'Jun 05, 2026',score:null,status:'Review pending'},
   {name:'Sara Khan',email:'sara.khan@hurix.com',date:'Jun 02, 2026',score:6.4,status:'Completed'},
   {name:'Tom Hayes',email:'tom.hayes@hurix.com',date:'—',score:null,status:'Not started'}]},
 {id:'ohup',title:'Objection handling under pressure',mode:'Roleplay',section:'Cohort A',role:'Junior leasing agent',context:'Residential leasing',scenario:'Respond to a hesitant tenant raising price and timing objections.',rubric:'4 criteria · max 10',due:'Jun 10, 2026',link:'assessment-details.html',
  learners:[
   {name:'Ayan Learner',email:'work.ayandutta+3@gmail.com',date:'Jun 05, 2026',score:7.5,status:'Completed'},
   {name:'Ayan 18',email:'ayan.dutta+18@hurix.com',date:'Jun 05, 2026',score:8.0,status:'Completed'},
   {name:'Maya Rodriguez',email:'maya.r@hurix.com',date:'Jun 04, 2026',score:6.8,status:'Completed'},
   {name:'Leo Park',email:'leo.park@hurix.com',date:'Jun 06, 2026',score:6.5,status:'Completed'},
   {name:'Sara Khan',email:'sara.khan@hurix.com',date:'—',score:null,status:'Not started'},
   {name:'Tom Hayes',email:'tom.hayes@hurix.com',date:'—',score:null,status:'Not started'}]},
 {id:'ltkc',title:'Lease terms knowledge check',mode:'Quiz',section:'Cohort B',role:'—',context:'Residential leasing',scenario:'20-question check on standard lease clauses and tenant rights.',rubric:'20 questions',due:'Jun 12, 2026',link:'assessment-details.html',
  learners:[
   {name:'Ayan Learner',email:'work.ayandutta+3@gmail.com',date:'Jun 03, 2026',score:9.0,status:'Completed'},
   {name:'Ayan 18',email:'ayan.dutta+18@hurix.com',date:'Jun 03, 2026',score:8.5,status:'Completed'},
   {name:'Maya Rodriguez',email:'maya.r@hurix.com',date:'Jun 03, 2026',score:9.5,status:'Completed'},
   {name:'Leo Park',email:'leo.park@hurix.com',date:'Jun 02, 2026',score:8.0,status:'Completed'},
   {name:'Sara Khan',email:'sara.khan@hurix.com',date:'Jun 02, 2026',score:7.5,status:'Completed'},
   {name:'Tom Hayes',email:'tom.hayes@hurix.com',date:'Jun 04, 2026',score:10.0,status:'Completed'}]}
];

function stats(a){
  const total=a.learners.length;
  const done=a.learners.filter(l=>l.status==='Completed').length;
  const pend=a.learners.filter(l=>l.status==='Review pending').length;
  const ns=a.learners.filter(l=>l.status==='Not started').length;
  const scored=a.learners.filter(l=>typeof l.score==='number');
  const avg=scored.length?(scored.reduce((s,l)=>s+l.score,0)/scored.length):null;
  return {total,done,pend,ns,avg:avg===null?null:Math.round(avg*10)/10};
}
function initials(n){const p=n.trim().split(/\s+/);return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function modeBadge(m){
  if(m==='Roleplay') return '<span class="badge b-roleplay"><svg class="icon"><use href="#i-msg"/></svg>Roleplay</span>';
  return '<span class="badge b-quiz"><svg class="icon"><use href="#i-clipboard"/></svg>Quiz</span>';
}

let view='card';
function setView(v){view=v;tCard.classList.toggle('active',v==='card');tList.classList.toggle('active',v==='list');render();}

function filtered(){
  const q=document.getElementById('q').value.toLowerCase();
  const sec=document.getElementById('fSection').value;
  const mode=document.getElementById('fMode').value;
  return DATA.filter(a=>a.title.toLowerCase().includes(q)&&(sec==='All'||a.section===sec)&&(mode==='All'||a.mode===mode));
}

function render(){
  const list=filtered();
  const cv=document.getElementById('cardview'), lv=document.getElementById('listview');
  cv.style.display=view==='card'?'grid':'none';
  lv.style.display=view==='list'?'block':'none';
  if(!list.length){cv.style.display='block';cv.innerHTML='<div class="empty">No assessments match your filters.</div>';lv.style.display='none';return;}
  if(view==='card') renderCards(list); else renderList(list);
}

function renderCards(list){
  document.getElementById('cardview').innerHTML=list.map(a=>{
    const s=stats(a);
    const dw=s.done/s.total*100, pw=s.pend/s.total*100, nw=s.ns/s.total*100;
    return `<div class="card">
      <div class="card-top"><p class="card-title">${a.title}</p>
        <button class="kebab" onclick="toast('Card menu — demo only')" aria-label="More"><svg class="icon" style="width:18px;height:18px"><use href="#i-kebab"/></svg></button></div>
      <div class="badges">${modeBadge(a.mode)}<span class="badge b-gray">${a.section}</span></div>
      <div class="meta2">
        <div><span class="k">Learner role</span>${a.role}</div>
        <div><span class="k">Context</span>${a.context}</div>
      </div>
      <div class="progwrap">
        <div class="prow"><span class="lab">Progress</span><span class="cnt"><b>${s.done}</b><span class="muted"> / ${s.total} completed</span></span></div>
        <div class="pbar"><i class="seg-done" style="width:${dw}%"></i><i class="seg-pend" style="width:${pw}%"></i><i class="seg-ns" style="width:${nw}%"></i></div>
        <div class="legend">
          <span><span class="dot seg-done"></span>${s.done} completed</span>
          <span><span class="dot seg-pend"></span>${s.pend} review pending</span>
          <span class="avg"><svg class="icon"><use href="#i-star"/></svg>Avg <b>${s.avg===null?'—':s.avg}</b></span>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-soft" onclick="openDrawer('${a.id}')"><svg class="icon"><use href="#i-panel"/></svg>Quick view</button>
        <a class="btn-view" href="${a.link}">View details <svg class="icon"><use href="#i-arrow-right"/></svg></a>
      </div>
    </div>`;
  }).join('');
}

function renderList(list){
  document.getElementById('listbody').innerHTML=list.map(a=>{
    const s=stats(a);
    const dw=s.done/s.total*100, pw=s.pend/s.total*100;
    return `<tr>
      <td class="ltitle">${a.title}</td>
      <td>${modeBadge(a.mode)}</td>
      <td>${a.section}</td>
      <td><div class="miniprog"><span class="bar"><i class="seg-done" style="width:${dw}%"></i><i class="seg-pend" style="width:${pw}%"></i></span>${s.done}/${s.total}</div></td>
      <td>${s.pend?`<span class="pill pill-pend">${s.pend} pending</span>`:'<span style="color:var(--text-3)">—</span>'}</td>
      <td><b>${s.avg===null?'—':s.avg}</b></td>
      <td><a class="link" href="#" onclick="openDrawer('${a.id}');return false">Quick view <svg class="icon"><use href="#i-chev-right"/></svg></a></td>
    </tr>`;
  }).join('');
}

function openDrawer(id){
  const a=DATA.find(x=>x.id===id), s=stats(a);
  document.getElementById('dr-title').textContent=a.title;
  document.getElementById('dr-badges').innerHTML=modeBadge(a.mode)+`<span class="badge b-gray">${a.section}</span>`;
  document.getElementById('dr-stats').innerHTML=`
    <div class="stat-tile"><span class="k">Completed</span><span class="v">${s.done}<span style="font-size:13px;color:var(--text-3)"> / ${s.total}</span></span></div>
    <div class="stat-tile"><span class="k">Avg score</span><span class="v">${s.avg===null?'—':s.avg}</span></div>`;
  document.getElementById('dr-alert').innerHTML=s.pend?`<div class="alert"><svg class="icon"><use href="#i-clock-ex"/></svg>${s.pend} submission${s.pend>1?'s':''} awaiting your review</div>`:'';
  document.getElementById('dr-setup').innerHTML=`
    <tr><td class="k">Learner role</td><td>${a.role}</td></tr>
    <tr><td class="k">Context</td><td>${a.context}</td></tr>
    <tr><td class="k">Scenario</td><td>${a.scenario}</td></tr>
    <tr><td class="k">Rubric</td><td>${a.rubric}</td></tr>
    <tr><td class="k">Due</td><td>${a.due}</td></tr>`;
  document.getElementById('dr-learners').innerHTML=a.learners.map(l=>{
    const pill=l.status==='Completed'?'pill-done':l.status==='Review pending'?'pill-pend':'pill-ns';
    const right=l.status==='Completed'?`<span class="scoreb">${l.score}</span>`:'';
    return `<div class="lrow">
      <div class="avatar ${l.status==='Not started'?'av-gray':'av-info'}">${initials(l.name)}</div>
      <div class="nm"><span>${l.name}</span><small>${l.date}</small></div>
      ${right}<span class="pill ${pill}">${l.status}</span>
      <svg class="icon" style="width:16px;height:16px;color:var(--text-3)"><use href="#i-chev-right"/></svg>
    </div>`;
  }).join('');
  document.getElementById('dr-full').href=a.link;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').setAttribute('aria-hidden','false');
}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('open');document.getElementById('drawer').setAttribute('aria-hidden','true');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});

function toggleTheme(){
  document.body.classList.toggle('dark');
  document.getElementById('theme-ic').innerHTML='<use href="#'+(document.body.classList.contains('dark')?'i-moon':'i-sun')+'"/>';
}
let tT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2000);}

render();
openDrawer('cdrl');
</script>
</body>
</html>
