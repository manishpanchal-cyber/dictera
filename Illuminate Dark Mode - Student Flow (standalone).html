document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\" data-theme=\"dark\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Illuminate · Student Flow · Dark Mode<\u002Ftitle>\n<style>/* ─────────────────────────────────────────────────────────────\n   Illuminate Design System — Color & Type tokens\n   Source of truth: Figma \"Illuminate Design System\" + brand guidelines.\n   ───────────────────────────────────────────────────────────── */\n\n/* ─── Webfonts ─────────────────────────────────────────────── */\n@font-face {\n  font-family: \"Quicksand\";\n  font-weight: 300;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"ce25b6c5-845e-4871-a84f-17f01e8df643\") format(\"truetype\");\n}\n@font-face {\n  font-family: \"Quicksand\";\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"ae15e6c7-e1c5-418b-bfe5-33a6e61cca1a\") format(\"truetype\");\n}\n@font-face {\n  font-family: \"Quicksand\";\n  font-weight: 500;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"3cc6684a-947d-44de-89c7-75e8608c8f4e\") format(\"truetype\");\n}\n@font-face {\n  font-family: \"Quicksand\";\n  font-weight: 600;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"3a00b70a-0ba3-4174-9182-1ae1d5b9d6ac\") format(\"truetype\");\n}\n@font-face {\n  font-family: \"Quicksand\";\n  font-weight: 700;\n  font-style: normal;\n  font-display: swap;\n  src: url(\"e187626e-3b76-45fd-94df-2342dc1d5866\") format(\"truetype\");\n}\n\n:root {\n  /* ─── Primary brand palette ───────────────────────────────\n     Three \"brand notes\" that combine into the signature Illuminate\n     gradient. Use solid forms for surfaces, gradient for AI moments. */\n  --ill-violet:        #815DE5;  /* gradient start  • AI / premium     */\n  --ill-violet-deep:   #7141EF;  /* deeper violet for press, glyphs    */\n  --ill-blue:          #247CB2;  /* PRIMARY brand • text, focus, links */\n  --ill-blue-deep:     #1A5E89;  /* hover / pressed primary            */\n  --ill-cyan:          #60B7FF;  /* bright AI accent                   */\n  --ill-teal:          #68CEA7;  /* gradient end • success accent      */\n  --ill-green:         #0CA678;  /* success solid                      */\n  --ill-green-deep:    #0C9874;  /* success pressed                    */\n\n  /* Secondary / supporting ----------------------------------- */\n  --ill-magenta:       #B5349D;  /* analytics / live indicators        */\n  --ill-lavender:      #D1B1EE;  /* AI guidance background             */\n  --ill-indigo:        #2740B0;  /* deep indigo for charts             */\n  --ill-navy:          #162649;  /* dark headings, dark surface        */\n\n  /* Semantic colors ----------------------------------------- */\n  --ill-success:       #0CA678;\n  --ill-success-soft:  #E6F7F0;\n  --ill-warning:       #E78A2B;  /* warm orange — improvement areas    */\n  --ill-warning-soft:  #FEF0AE;\n  --ill-danger:        #D7284E;  /* critical / inline errors           */\n  --ill-danger-soft:   #FDE8EC;\n  --ill-info:          #247CB2;\n  --ill-info-soft:     #E1F1FF;\n\n  /* Surfaces / neutrals ------------------------------------- */\n  --ill-white:         #FFFFFF;\n  --ill-bg:            #FFFFFF;  /* primary surface                    */\n  --ill-bg-subtle:     #F7FAFD;  /* page bg, airy section bg           */\n  --ill-bg-blue:       #E1F1FF;  /* selected nav, soft chips           */\n  --ill-bg-blue-50:    #F3F8FD;  /* hovered rows, hover cards          */\n  --ill-bg-lavender:   #F4EEFF;  /* AI insight card bg                 */\n\n  /* Borders ------------------------------------------------- */\n  --ill-border:        #C7DCEE;  /* default light-blue border          */\n  --ill-border-strong: #247CB2;  /* active / focused                   */\n  --ill-border-subtle: #DEECF1;  /* row dividers                       */\n  --ill-border-neutral:#E5EAF0;  /* off-brand neutral divider          */\n  --ill-border-danger: #D7284E;\n\n  /* Text ---------------------------------------------------- */\n  --ill-text:          #1D1F23;  /* primary text (near-black)          */\n  --ill-text-2:        #3A4052;  /* secondary body text                */\n  --ill-text-3:        #637083;  /* meta / placeholder                 */\n  --ill-text-4:        #95A1B0;  /* disabled                           */\n  --ill-text-on-grad:  #FFFFFF;\n  --ill-text-link:     #247CB2;\n\n  /* Signature gradients ------------------------------------- */\n  --ill-gradient: linear-gradient(135deg,#815DE5 0%,#247CB2 52%,#68CEA7 100%); /* @kind color */\n  --ill-gradient-soft: linear-gradient(135deg,rgba(129,93,229,0.10) 0%,rgba(36,124,178,0.10) 52%,rgba(104,206,167,0.10) 100%); /* @kind color */\n  --ill-gradient-vert: linear-gradient(180deg,#815DE5 0%,#247CB2 52%,#68CEA7 100%); /* @kind color */\n  --ill-gradient-text: linear-gradient(135deg,#815DE5 0%,#247CB2 52%,#0CA678 100%);\n\n  /* Radii --------------------------------------------------- */\n  --ill-radius-xs:     4px;\n  --ill-radius-sm:     8px;   /* inputs, chips                        */\n  --ill-radius-md:     12px;  /* buttons, default                     */\n  --ill-radius-lg:     16px;  /* cards, toasts                        */\n  --ill-radius-xl:     20px;  /* hero cards, large containers         */\n  --ill-radius-pill:   999px;\n\n  /* Elevation ---------------------------------------------- */\n  --ill-shadow-xs:     0 1px 2px rgba(99,112,131,.08);\n  --ill-shadow-sm:     0 2px 8px rgba(99,99,99,.12);          /* button */\n  --ill-shadow-md:     0 4px 16px rgba(25,113,194,.10);       /* card hover */\n  --ill-shadow-lg:     0 8px 28px rgba(25,113,194,.14);       /* modal */\n  --ill-shadow-toast:  20px 20px 20px rgba(0,0,0,.08);\n  --ill-shadow-focus:  0 0 0 4px rgba(36,124,178,.18);\n  --ill-shadow-focus-violet: 0 0 0 4px rgba(129,93,229,.22);\n  --ill-glow-ai:       0 0 24px rgba(129,93,229,.25);\n\n  /* Spacing (4-base) --------------------------------------- */\n  --ill-s-1: 4px;\n  --ill-s-2: 8px;\n  --ill-s-3: 12px;\n  --ill-s-4: 16px;\n  --ill-s-5: 20px;\n  --ill-s-6: 24px;\n  --ill-s-7: 32px;\n  --ill-s-8: 40px;\n  --ill-s-9: 48px;\n  --ill-s-10: 64px;\n\n  /* ─── Type ────────────────────────────────────────────────\n     Quicksand throughout. SemiBold (600) for headings + buttons,\n     Medium (500) for body, Bold (700) for strong emphasis and CTAs. */\n  --ill-font-sans:  \"Quicksand\", \"Nunito\", system-ui, -apple-system, sans-serif;\n  --ill-font-display: \"Quicksand\", \"Nunito\", system-ui, sans-serif;\n\n  /* Letter-spacing — Quicksand reads slightly loose, so most UI text\n     tightens by ~2% in the Figma. */\n  --ill-tracking-tight: -0.02em;\n  --ill-tracking-normal: 0;\n\n  /* Type scale (px / line-height) -------------------------- */\n  --ill-size-display: 32px;  --ill-lh-display: 40px;\n  --ill-size-h1:      28px;  --ill-lh-h1:      36px;\n  --ill-size-h2:      24px;  --ill-lh-h2:      32px;\n  --ill-size-h3:      20px;  --ill-lh-h3:      28px;\n  --ill-size-h4:      18px;  --ill-lh-h4:      26px;\n  --ill-size-body-lg: 16px;  --ill-lh-body-lg: 24px;\n  --ill-size-body:    14px;  --ill-lh-body:    22px;\n  --ill-size-small:   13px;  --ill-lh-small:   20px;\n  --ill-size-meta:    12px;  --ill-lh-meta:    18px;\n}\n\n/* ─── Semantic class helpers ─────────────────────────────── */\n.ill-h-display, h1.ill-display {\n  font-family: var(--ill-font-display);\n  font-weight: 700;\n  font-size: var(--ill-size-display);\n  line-height: var(--ill-lh-display);\n  letter-spacing: var(--ill-tracking-tight);\n  color: var(--ill-text);\n}\n.ill-h1 {\n  font-family: var(--ill-font-display);\n  font-weight: 700;\n  font-size: var(--ill-size-h1);\n  line-height: var(--ill-lh-h1);\n  letter-spacing: var(--ill-tracking-tight);\n  color: var(--ill-text);\n}\n.ill-h2 {\n  font-family: var(--ill-font-display);\n  font-weight: 600;\n  font-size: var(--ill-size-h2);\n  line-height: var(--ill-lh-h2);\n  letter-spacing: var(--ill-tracking-tight);\n  color: var(--ill-text);\n}\n.ill-h3 {\n  font-family: var(--ill-font-sans);\n  font-weight: 600;\n  font-size: var(--ill-size-h3);\n  line-height: var(--ill-lh-h3);\n  letter-spacing: var(--ill-tracking-tight);\n  color: var(--ill-text);\n}\n.ill-h4, .ill-section-label {\n  font-family: var(--ill-font-sans);\n  font-weight: 600;\n  font-size: var(--ill-size-h4);\n  line-height: var(--ill-lh-h4);\n  letter-spacing: var(--ill-tracking-tight);\n  color: var(--ill-text);\n}\n.ill-body-lg, p.ill-body-lg {\n  font-family: var(--ill-font-sans);\n  font-weight: 500;\n  font-size: var(--ill-size-body-lg);\n  line-height: var(--ill-lh-body-lg);\n  color: var(--ill-text-2);\n}\n.ill-body, p.ill-body {\n  font-family: var(--ill-font-sans);\n  font-weight: 500;\n  font-size: var(--ill-size-body);\n  line-height: var(--ill-lh-body);\n  color: var(--ill-text-2);\n}\n.ill-small {\n  font-family: var(--ill-font-sans);\n  font-weight: 500;\n  font-size: var(--ill-size-small);\n  line-height: var(--ill-lh-small);\n  color: var(--ill-text-3);\n}\n.ill-meta, .ill-caption {\n  font-family: var(--ill-font-sans);\n  font-weight: 500;\n  font-size: var(--ill-size-meta);\n  line-height: var(--ill-lh-meta);\n  color: var(--ill-text-3);\n}\n.ill-label {\n  font-family: var(--ill-font-sans);\n  font-weight: 500;\n  font-size: var(--ill-size-body);\n  line-height: 20px;\n  letter-spacing: var(--ill-tracking-tight);\n  color: var(--ill-text);\n}\n.ill-button-text {\n  font-family: var(--ill-font-sans);\n  font-weight: 700;\n  font-size: 14px;\n  line-height: 20px;\n  letter-spacing: var(--ill-tracking-tight);\n}\n.ill-gradient-text {\n  background: var(--ill-gradient-text);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  -webkit-text-fill-color: transparent;\n}\n<\u002Fstyle>\n<style>/* ─────────────────────────────────────────────────────────────\n   Illuminate Design System — DARK MODE tokens\n   \"Light breaking through dark surfaces.\" Premium & radiant.\n\n   Strategy\n   ────────\n   • 1:1 semantic mapping — every light --ill-* token has a dark\n     counterpart of the SAME name, so components are theme-agnostic.\n   • No pure black canvas. Surfaces are illuminated midnight-indigo\n     neutrals built on the brand navy #162649 (hue ≈ 264°).\n   • Elevation = lighter surface tint, not heavier shadow. Level 0\n     (canvas) is darkest; each step up lifts lightness ~4–5%.\n   • Accents are lightened + slightly desaturated so they stay\n     vibrant on dark without optical \"vibration\". All body/link\n     uses clear ≥ 4.5:1 (WCAG AA) on surface level 2.\n\n   Usage: load AFTER colors_and_type.css. Toggle by setting\n   data-theme=\"dark\" on <html> (or any subtree). Light is :root.\n   ───────────────────────────────────────────────────────────── */\n\n/* Elevation ladder — available in BOTH themes so components can\n   reference --ill-elev-N regardless of mode. */\n:root {\n  --ill-elev-0: #FFFFFF;   /* page canvas              */\n  --ill-elev-1: #F7FAFD;   /* sunken / section bg      */\n  --ill-elev-2: #FFFFFF;   /* cards                    */\n  --ill-elev-3: #FFFFFF;   /* raised / popovers        */\n  --ill-elev-4: #FFFFFF;   /* overlays / modals        */\n  --ill-edge-light: inset 0 0 0 1px rgba(199,220,238,0); /* @kind shadow */ /* no-op in light */\n}\n\n[data-theme=\"dark\"] {\n  /* ─── Surface & elevation ladder ────────────────────────────\n     Midnight-indigo neutrals. Darkest canvas → brightest overlay. */\n  --ill-elev-0: #0C1322;   /* L0 · canvas (deepest)            */\n  --ill-elev-1: #111B2E;   /* L1 · sunken / section bg         */\n  --ill-elev-2: #18253E;   /* L2 · cards (default surface)     */\n  --ill-elev-3: #1F2F4C;   /* L3 · raised / popovers / inputs  */\n  --ill-elev-4: #28395B;   /* L4 · overlays / hovered rows     */\n  /* a soft top highlight = \"illuminated edge\" instead of a drop shadow */\n  --ill-edge-light: inset 0 1px 0 rgba(190,214,255,0.07); /* @kind shadow */\n\n  /* ─── Surfaces / neutrals (semantic, 1:1 with light) ──────── */\n  --ill-white:         #18253E;  /* \"white\" card → L2 surface        */\n  --ill-bg:            #0C1322;  /* primary surface → canvas         */\n  --ill-bg-subtle:     #111B2E;  /* page bg, airy section → L1       */\n  --ill-bg-blue:       #16345A;  /* selected nav / soft blue chip    */\n  --ill-bg-blue-50:    #15243E;  /* hovered rows / hover cards       */\n  --ill-bg-lavender:   #211B3C;  /* AI insight card bg               */\n\n  /* ─── Borders ──────────────────────────────────────────────\n     Borders carry depth in dark mode — keep them visible. */\n  --ill-border:        #2C3C5C;  /* default                          */\n  --ill-border-strong: #54A8E0;  /* active / focused (brand blue)    */\n  --ill-border-subtle: #223151;  /* row dividers                     */\n  --ill-border-neutral:#2A3650;  /* off-brand neutral divider        */\n  --ill-border-danger: #F25C77;\n\n  /* ─── Text (AA-checked on L2 #18253E) ─────────────────────── */\n  --ill-text:          #EAF1FB;  /* primary  · 13.5:1                */\n  --ill-text-2:        #BCCBE2;  /* secondary body · 9.1:1           */\n  --ill-text-3:        #93A3BF;  /* meta / placeholder · 6.0:1       */\n  --ill-text-4:        #5E6E8C;  /* disabled                         */\n  --ill-text-on-grad:  #FFFFFF;\n  --ill-text-link:     #6CB6E8;  /* link blue · 6.6:1                */\n\n  /* ─── Primary brand palette (lightened + lightly desaturated) ─ */\n  --ill-violet:        #A98CF0;  /* AI / premium · 4.8:1             */\n  --ill-violet-deep:   #B79DF4;  /* press / glyph (brighter)         */\n  --ill-blue:          #54A8E0;  /* PRIMARY · text/focus/icons 5.9:1 */\n  --ill-blue-deep:     #3E97D6;  /* hover / pressed primary          */\n  --ill-cyan:          #7CC4FF;  /* bright AI accent                 */\n  --ill-teal:          #74D6AF;  /* gradient end / success accent    */\n  --ill-green:         #2FC79A;  /* success solid · 7.0:1            */\n  --ill-green-deep:    #27B488;  /* success pressed                  */\n\n  /* ─── Secondary / supporting ──────────────────────────────── */\n  --ill-magenta:       #D45EBE;  /* analytics / live indicators      */\n  --ill-lavender:      #A98CF0;  /* AI guidance                      */\n  --ill-indigo:        #6E84E6;  /* deep indigo for charts           */\n  --ill-navy:          #EAF1FB;  /* was dark headings → now light    */\n\n  /* ─── Semantic colors ─────────────────────────────────────── */\n  --ill-success:       #2FC79A;\n  --ill-success-soft:  rgba(47,199,154,0.15);\n  --ill-warning:       #F0A24E;\n  --ill-warning-soft:  rgba(240,162,78,0.15);\n  --ill-danger:        #F25C77;\n  --ill-danger-soft:   rgba(242,92,119,0.16);\n  --ill-info:          #54A8E0;\n  --ill-info-soft:     rgba(84,168,224,0.15);\n\n  /* ─── Signature gradients ─────────────────────────────────────\n     The brand gradient is kept VIVID on dark — it is the literal\n     \"light breaking through\". A lightened variant is offered for\n     large fills where the vivid one would glare. */\n  --ill-gradient: linear-gradient(135deg,#815DE5 0%,#247CB2 52%,#68CEA7 100%); /* @kind color */\n  --ill-gradient-bright: linear-gradient(135deg,#9B7BEA 0%,#3E97D6 52%,#74D6AF 100%); /* @kind color */\n  --ill-gradient-soft: linear-gradient(135deg,rgba(155,123,234,0.18) 0%,rgba(84,168,224,0.16) 52%,rgba(116,214,175,0.16) 100%); /* @kind color */\n  --ill-gradient-vert: linear-gradient(180deg,#815DE5 0%,#247CB2 52%,#68CEA7 100%); /* @kind color */\n  --ill-gradient-text: linear-gradient(135deg,#A98CF0 0%,#54A8E0 52%,#74D6AF 100%);\n\n  /* ─── Elevation: depth via tint, shadow stays quiet ───────── */\n  --ill-shadow-xs:     0 1px 2px rgba(0,0,0,0.40);\n  --ill-shadow-sm:     0 2px 8px rgba(0,0,0,0.45);\n  --ill-shadow-md:     0 6px 20px rgba(0,0,0,0.50);\n  --ill-shadow-lg:     0 12px 32px rgba(0,0,0,0.55);\n  --ill-shadow-toast:  0 16px 36px rgba(0,0,0,0.55);\n  --ill-shadow-focus:  0 0 0 4px rgba(84,168,224,0.35);\n  --ill-shadow-focus-violet: 0 0 0 4px rgba(169,140,240,0.38);\n  --ill-glow-ai:       0 0 28px rgba(155,123,234,0.40);\n}\n\n/* Page-level convenience: when the document root is dark, paint the\n   canvas and default text so bare HTML inherits sensible values. */\n[data-theme=\"dark\"] {\n  background-color: var(--ill-bg);\n  color: var(--ill-text);\n  color-scheme: dark;\n}\n<\u002Fstyle>\n<script src=\"d2464d0a-1df1-4023-b5aa-7a0dcb4868a1\"><\u002Fscript>\n<style>\n  *{ box-sizing:border-box; margin:0; padding:0; }\n  html,body{ background:var(--ill-bg); color:var(--ill-text);\n    font-family:var(--ill-font-sans); letter-spacing:var(--ill-tracking-tight);\n    -webkit-font-smoothing:antialiased; }\n  :root{ --e:cubic-bezier(.4,0,.2,1); }\n\n  /* page header */\n  .page-head{ position:relative; overflow:hidden; padding:48px 40px 36px;\n    border-bottom:1px solid var(--ill-border-subtle); }\n  .page-head::before{ content:\"\"; position:absolute; inset:-50% 40% auto -10%; height:380px;\n    background:var(--ill-gradient); filter:blur(120px); opacity:.34; border-radius:999px; }\n  .page-head .brand{ display:flex; align-items:center; gap:12px; margin-bottom:22px; position:relative; }\n  .page-head .brand img{ height:26px; }\n  .page-head .brand .tag{ font-size:12px; font-weight:600; color:var(--ill-text-3);\n    padding:4px 10px; border:1px solid var(--ill-border); border-radius:999px; }\n  .page-head .eyebrow{ display:inline-flex; align-items:center; gap:8px; font-size:12px;\n    font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ill-text-3);\n    margin-bottom:14px; position:relative; }\n  .page-head .eyebrow i{ width:15px; height:15px; }\n  .page-head h1{ font-size:clamp(30px,4.5vw,46px); line-height:1.05; font-weight:700;\n    letter-spacing:-0.03em; position:relative; max-width:20ch; }\n  .page-head h1 .grad{ background:var(--ill-gradient-text); -webkit-background-clip:text;\n    background-clip:text; -webkit-text-fill-color:transparent; }\n  .page-head p{ margin-top:16px; font-size:15px; line-height:1.55; max-width:60ch;\n    color:var(--ill-text-2); font-weight:500; position:relative; }\n\n  /* gallery grid */\n  .gallery{ display:flex; flex-wrap:wrap; gap:48px 40px; justify-content:center;\n    padding:56px 40px 80px; align-items:flex-start; }\n  .cell{ display:flex; flex-direction:column; align-items:center; width:340px; }\n  .cap{ display:flex; align-items:center; gap:10px; margin-bottom:18px; width:100%; }\n  .cap .n{ width:30px; height:30px; border-radius:9px; flex-shrink:0; display:grid; place-items:center;\n    background:var(--ill-gradient); color:#fff; font-size:13px; font-weight:700;\n    box-shadow:var(--ill-glow-ai); }\n  .cap .tt{ font-size:14px; font-weight:700; color:var(--ill-text); }\n  .cap .ss{ font-size:11.5px; font-weight:500; color:var(--ill-text-3); margin-top:1px; }\n\n  /* device — auto height so every screen shows in full */\n  .device{ width:340px; border-radius:46px; padding:12px;\n    background:linear-gradient(160deg,#3a3f52,#15171f); position:relative;\n    box-shadow:0 36px 80px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.06); }\n  .screen-port{ width:100%; border-radius:34px; overflow:hidden; background:var(--ill-bg); }\n  .screen{ display:flex; flex-direction:column; min-height:684px; background:var(--ill-bg); }\n\n  /* statusbar */\n  .statusbar{ display:flex; justify-content:space-between; align-items:center;\n    padding:14px 22px 6px; flex-shrink:0; }\n  .statusbar .time{ font-size:14px; font-weight:700; color:var(--ill-text); }\n  .statusbar .icons{ display:flex; gap:6px; color:var(--ill-text); }\n  .statusbar .icons i{ width:16px; height:16px; }\n  .scr-body{ padding:8px 16px 20px; flex:1; }\n  .scr-foot{ padding:14px 16px 18px; flex-shrink:0; }\n\n  .scr-h{ display:flex; align-items:center; gap:9px; margin:6px 2px 4px; }\n  .scr-h .dot{ width:22px; height:22px; border-radius:7px; back
